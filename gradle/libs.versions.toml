[versions]
hapi = "8.8.1"
cql = "4.6.0"
junit = "5.14.3"
slf4j = "2.0.17"
spring-boot = "3.4.11"
picocli = "4.7.7"
jmh = "1.37"
jakarta-annotation = "2.1.1"
commons-compress = "1.28.0"
commons-codec = "1.21.0"
mockito = "5.21.0"
hamcrest = "3.0"
jsonassert = "1.5.3"
equalsverifier = "4.3.1"
reflections = "0.10.2"
slf4j-test = "3.0.3"
spring = "6.2.12"

sonarqube = "7.2.2.6593"

[libraries]
# BOMs (used by convention plugins)
hapi-fhir-bom = { module = "ca.uhn.hapi.fhir:hapi-fhir-bom", version.ref = "hapi" }
cql-bom = { module = "org.cqframework:cql-bom", version.ref = "cql" }
junit-bom = { module = "org.junit:junit-bom", version.ref = "junit" }

# HAPI FHIR (all versioned at hapi; BOM also imported for transitive management)
hapi-fhir-base = { module = "ca.uhn.hapi.fhir:hapi-fhir-base", version.ref = "hapi" }
hapi-fhir-client = { module = "ca.uhn.hapi.fhir:hapi-fhir-client", version.ref = "hapi" }
hapi-fhir-structures-dstu3 = { module = "ca.uhn.hapi.fhir:hapi-fhir-structures-dstu3", version.ref = "hapi" }
hapi-fhir-structures-r4 = { module = "ca.uhn.hapi.fhir:hapi-fhir-structures-r4", version.ref = "hapi" }
hapi-fhir-structures-r4b = { module = "ca.uhn.hapi.fhir:hapi-fhir-structures-r4b", version.ref = "hapi" }
hapi-fhir-structures-r5 = { module = "ca.uhn.hapi.fhir:hapi-fhir-structures-r5", version.ref = "hapi" }
hapi-fhir-structures-dstu2x1 = { module = "ca.uhn.hapi.fhir:hapi-fhir-structures-dstu2.1", version.ref = "hapi" }
hapi-fhir-validation = { module = "ca.uhn.hapi.fhir:hapi-fhir-validation", version.ref = "hapi" }
hapi-fhir-validation-resources-dstu3 = { module = "ca.uhn.hapi.fhir:hapi-fhir-validation-resources-dstu3", version.ref = "hapi" }
hapi-fhir-validation-resources-r4 = { module = "ca.uhn.hapi.fhir:hapi-fhir-validation-resources-r4", version.ref = "hapi" }
hapi-fhir-validation-resources-r4b = { module = "ca.uhn.hapi.fhir:hapi-fhir-validation-resources-r4b", version.ref = "hapi" }
hapi-fhir-validation-resources-r5 = { module = "ca.uhn.hapi.fhir:hapi-fhir-validation-resources-r5", version.ref = "hapi" }
hapi-fhir-caching-caffeine = { module = "ca.uhn.hapi.fhir:hapi-fhir-caching-caffeine", version.ref = "hapi" }
hapi-fhir-converter = { module = "ca.uhn.hapi.fhir:hapi-fhir-converter", version.ref = "hapi" }
hapi-fhir-jpaserver-base = { module = "ca.uhn.hapi.fhir:hapi-fhir-jpaserver-base", version.ref = "hapi" }
hapi-fhir-storage = { module = "ca.uhn.hapi.fhir:hapi-fhir-storage", version.ref = "hapi" }
hapi-fhir-server-cds-hooks = { module = "ca.uhn.hapi.fhir:hapi-fhir-server-cds-hooks", version.ref = "hapi" }
hapi-fhir-test-utilities = { module = "ca.uhn.hapi.fhir:hapi-fhir-test-utilities", version.ref = "hapi" }
hapi-fhir-storage-test-utilities = { module = "ca.uhn.hapi.fhir:hapi-fhir-storage-test-utilities", version.ref = "hapi" }
hapi-fhir-jpaserver-test-utilities = { module = "ca.uhn.hapi.fhir:hapi-fhir-jpaserver-test-utilities", version.ref = "hapi" }

# CQL Engine (BOM-managed)
cql-engine = { module = "org.cqframework:engine", version.ref = "cql" }
cql-engine-fhir = { module = "org.cqframework:engine-fhir", version.ref = "cql" }
cql-to-elm-jvm = { module = "org.cqframework:cql-to-elm-jvm", version.ref = "cql" }
cql-ucum = { module = "org.cqframework:ucum", version.ref = "cql" }
cql-elm-fhir = { module = "org.cqframework:elm-fhir", version.ref = "cql" }
cql-cqf-fhir = { module = "org.cqframework:cqf-fhir", version.ref = "cql" }
cql-cqf-fhir-npm = { module = "org.cqframework:cqf-fhir-npm", version.ref = "cql" }
cql-quick = { module = "org.cqframework:quick", version.ref = "cql" }

# Jakarta
jakarta-annotation-api = { module = "jakarta.annotation:jakarta.annotation-api", version.ref = "jakarta-annotation" }
jakarta-servlet-api = { module = "jakarta.servlet:jakarta.servlet-api" }

# Spring
spring-context = { module = "org.springframework:spring-context", version.ref = "spring" }
spring-test = { module = "org.springframework:spring-test", version.ref = "spring" }

# Logging
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
slf4j-simple = { module = "org.slf4j:slf4j-simple", version.ref = "slf4j" }
slf4j-test = { module = "com.github.valfirst:slf4j-test", version.ref = "slf4j-test" }

# CLI
picocli = { module = "info.picocli:picocli", version.ref = "picocli" }
picocli-codegen = { module = "info.picocli:picocli-codegen", version.ref = "picocli" }

# Commons
commons-compress = { module = "org.apache.commons:commons-compress", version.ref = "commons-compress" }
commons-codec = { module = "commons-codec:commons-codec", version.ref = "commons-codec" }

# Testing
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
hamcrest = { module = "org.hamcrest:hamcrest", version.ref = "hamcrest" }
mockito-core = { module = "org.mockito:mockito-core", version.ref = "mockito" }
mockito-junit-jupiter = { module = "org.mockito:mockito-junit-jupiter", version.ref = "mockito" }
jsonassert = { module = "org.skyscreamer:jsonassert", version.ref = "jsonassert" }
equalsverifier = { module = "nl.jqno.equalsverifier:equalsverifier", version.ref = "equalsverifier" }
reflections = { module = "org.reflections:reflections", version.ref = "reflections" }

# JMH
jmh-core = { module = "org.openjdk.jmh:jmh-core", version.ref = "jmh" }
jmh-generator-annprocess = { module = "org.openjdk.jmh:jmh-generator-annprocess", version.ref = "jmh" }

[plugins]
sonarqube = { id = "org.sonarqube", version.ref = "sonarqube" }
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
